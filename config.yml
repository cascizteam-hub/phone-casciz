backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "store_data"
    label: "Store Data"
    files:
      - file: "products.json"
        label: "All Products"
        name: "products_list"
        fields:
          - label: "Products"
            name: "products"
            widget: "list"
            fields:
              - { label: "Product Title", name: "name", widget: "string" }
              - { label: "Price", name: "price", widget: "number" }
              - { label: "Category", name: "category", widget: "select", options: ["hard", "soft", "glass"] }
              - { label: "Product Image", name: "image", widget: "image" }
